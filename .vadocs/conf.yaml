# Shared Governance Config — Single Source of Truth
#
# Cross-cutting definitions used by all validation scripts:
# field registry, block composition, type registry, tag vocabulary, date format.
#
# Doc type configs (adr.conf.yaml, evidence.conf.yaml) inherit from this file
# via parent_config pointer and add domain-specific operational rules.
#
# Governed by: ADR-26036 (Config File Location and Naming Conventions)
#              ADR-26042 (Common Frontmatter Standard)

# =============================================================================
# Field Registry — every governed frontmatter field defined once
# =============================================================================
# Fields are the atoms. Blocks compose them; types compose blocks.
#
# Maintenance:
#   human       — author sets the value
#   auto        — pre-commit hook maintains the value
#   human+auto  — human bumps, hook validates
#
# myst_native: true  → top-level YAML key, rendered by MyST site
# myst_native: false → lives under options.*, invisible to MyST but accessible
#                       to validation scripts and RAG pipelines
# Reference: https://mystmd.org/guide/frontmatter

field_registry:

  # --- Identity block fields ---
  title:
    description: "Document identity"
    maintenance: human
    myst_native: true

  type:
    description: "Self-describing file type (set once)"
    maintenance: human
    myst_native: false  # options.type

  authors:
    description: "Responsible party (owner, not necessarily the writer)"
    maintenance: human
    myst_native: true

  # --- Discovery block fields ---
  description:
    description: "Brief elevator pitch for progressive disclosure"
    maintenance: human
    myst_native: true

  tags:
    description: "Domain classification (validated against vocabulary)"
    maintenance: human
    myst_native: true

  token_size:
    description: "Context budget cost in tokens"
    maintenance: auto
    myst_native: false  # options.token_size

  # --- Lifecycle block fields ---
  date:
    description: "Last meaningful update"
    maintenance: auto
    myst_native: true

  birth:
    description: "Creation date (set once on new file)"
    maintenance: auto
    myst_native: false  # options.birth

  version:
    description: "SemVer traceability — if date changed, version must change"
    maintenance: human+auto
    myst_native: false  # options.version

  # --- Type-specific fields (not in any block, declared per type) ---
  id:
    description: "Cross-reference identifier (numeric for ADRs, prefixed for evidence)"
    maintenance: human
    myst_native: false  # options.id — MyST 'id' is project-level only

  status:
    description: "Lifecycle state (valid values defined per doc type config)"
    maintenance: human
    myst_native: false  # options.status

  superseded_by:
    description: "ADR ID that replaces this one"
    maintenance: human
    myst_native: false  # options.superseded_by

  severity:
    description: "Incident severity level"
    maintenance: human
    myst_native: false  # options.severity

  sources:
    description: "List of source IDs that fed into this artifact"
    maintenance: human
    myst_native: false  # options.sources

  produces:
    description: "List of ADR/artifact IDs this generates"
    maintenance: human
    myst_native: false  # options.produces

  model:
    description: "AI model name or 'human' for meetings"
    maintenance: human
    myst_native: false  # options.model

  extracted_into:
    description: "Analysis ID after source extraction (null until extraction)"
    maintenance: human
    myst_native: false  # options.extracted_into

  role:
    description: "Service file role (generated/template/navigation)"
    maintenance: human
    myst_native: false  # options.role

# =============================================================================
# Blocks — composable groups of fields (DITA specialization principle)
# =============================================================================
# Types compose blocks additively — blocks are only added, never subtracted.

blocks:
  identity:
    - title
    - type
    - authors

  discovery:
    - description
    - tags
    - token_size

  lifecycle:
    - date
    - birth
    - version

# =============================================================================
# Type Registry — which blocks each type composes + type-specific fields
# =============================================================================
# Adding a new type = declaring blocks + any type-specific required/optional.

types:
  adr:
    blocks: [identity, discovery, lifecycle]
    required: [id, status]
    optional: [superseded_by]

  analysis:
    blocks: [identity, discovery, lifecycle]
    required: [id, status]
    optional: [sources, produces]

  retrospective:
    blocks: [identity, discovery, lifecycle]
    required: [id, status, severity]
    optional: [produces]

  source:
    blocks: [identity, discovery]
    required: [id, model]
    optional: [extracted_into]

  tutorial:
    blocks: [identity, discovery, lifecycle]
    required: []
    optional: []

  guide:
    blocks: [identity, discovery, lifecycle]
    required: []
    optional: []

  script_instruction:
    blocks: [identity, discovery, lifecycle]
    required: []
    optional: []

  package_spec:
    blocks: [identity, discovery, lifecycle]
    required: []
    optional: []

  policy:
    blocks: [identity, discovery, lifecycle]
    required: []
    optional: []

  service:
    blocks: [identity]
    required: []
    optional: [role, version]

# =============================================================================
# Tags — shared vocabulary for all governed documents
# =============================================================================
# Alphabetical order. Adding a tag here makes it available to all doc types.
# Each tag has a description that defines its scope — use this to decide which
# tag fits a document.

tags:
  architecture:
    description: "Technical design decisions — system structure, component boundaries, patterns"
  ci:
    description: "Continuous integration — pipelines, hooks, automated checks, build steps"
  context_management:
    description: "AI context engineering — token budgets, progressive disclosure, memory, RAG"
  devops:
    description: "Infrastructure and deployment — containers, databases, hosting, environments"
  documentation:
    description: "Documentation standards — frontmatter, formatting, lifecycle, publishing"
  git:
    description: "Git workflow — branching, commits, hooks, repository conventions"
  governance:
    description: "Process and rules — ADR workflow, validation policies, naming conventions"
  hardware:
    description: "Physical compute — GPU/CPU selection, VRAM/RAM constraints, device specs"
  model:
    description: "AI models — selection criteria, taxonomy, capabilities, benchmarks"
  security:
    description: "Security policies — API key management, access control, vulnerability scanning"
  testing:
    description: "Test strategy — TDD, test quality standards, coverage, test infrastructure"
  workflow:
    description: "Development workflow — task orchestration, agent collaboration, release process"

# =============================================================================
# Date format — ISO 8601 date (YYYY-MM-DD)
# =============================================================================
date_format: "^\\d{4}-\\d{2}-\\d{2}$"
